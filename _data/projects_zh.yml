- id: robot-welding-system
  title: "面向焊缝识别的机器人孪生上位机系统"
  subtitle: "C++/Qt 上位机 · U-Net 焊缝分割 · OpenGL 数字孪生"
  period: "2024.09 - 2025.06"
  role: "负责视觉模型、上位机控制与数字孪生集成"
  keywords: ["机器人", "计算机视觉", "C++/Qt", "U-Net", "OpenGL"]
  one_liner: "面向焊缝识别与 LeArm 数字孪生演示，构建了结合语义分割、Qt 控制和 OpenGL 实时可视化的软件系统。"
  highlights:
    - "对比原始 U-Net、VGG-U-Net 与 VGG16 预训练权重方案，通过迁移学习、数据增强和数据集扩充将焊缝分割准确率由 64% 提升至 96.8%。"
    - "在 C++/Qt 上位机中集成图片选择、Python 推理调用和分割结果回显。"
    - "基于 OpenGL、STL 连杆模型与 DH 参数运动学实现数字孪生渲染，支持滑块控制和鼠标旋转、缩放、平移。"
  outcome: "将焊缝检测与机器人可视化集成到统一桌面流程中，简历记录的焊缝分割准确率达到 96.8%。"
