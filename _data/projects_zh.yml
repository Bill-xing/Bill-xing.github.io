- id: cr5-vla-openpi
  title: "CR5 面向 VLA/OpenPI 的真机数据采集与推理闭环适配"
  subtitle: "ROS2 Humble · Dobot CR5 · LeRobot v2.0 · OpenPI"
  period: "2026.01 - 2026.03"
  role: "负责手眼标定、遥操作、同步数据采集、安全校验、OpenPI 适配与真机推理部署"
  keywords: ["具身智能", "VLA", "ROS2", "OpenPI", "LeRobot", "真机部署"]
  one_liner: "围绕越疆 Dobot CR5、奥比中光 Astra2 RGB-D 相机和电动夹爪搭建 ROS2 真机闭环，覆盖标定、遥操作、同步数据采集、数据集转换、OpenPI 微调和 WebSocket 推理。"
  highlights:
    - "设计 HDF5 数据采集与同步方案，以 RGB 图像时间戳为主时钟，通过二分查找和线性插值对齐机械臂状态、目标动作和夹爪反馈。"
    - "通过 Fast DDS 共享内存与只启用 RGB 采集，将早期相机丢帧率从 27.15% 优化到 2.57%-4.74%。"
    - "完成 OpenPI 适配，打通 Dobot 7 维 state/action 映射、训练配置、WebSocket 策略服务和 CR5 推理客户端，并采用动作块与阻塞式短动作执行提高稳定性。"
  outcome: "建立了从真机录制、LeRobot v2.0 转换到 CR5 推理部署的安全校验闭环。"
  page: "/zh/projects/cr5-vla-openpi/"
